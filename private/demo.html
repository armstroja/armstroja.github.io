<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cloud Text Editor</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body style="margin: 0;">
    <div id="root"></div>

    <script type="text/babel">
        // Destructure hooks from the global React object
        const { useState, useEffect, useRef } = React;

        const ACCESS_CODE = "gsss";
        const STORAGE_KEY = "simple_cloud_editor";

        function CloudTextEditor() {
            const [unlocked, setUnlocked] = useState(false);
            const [codeInput, setCodeInput] = useState("");
            const [codeError, setCodeError] = useState(false);
            const [content, setContent] = useState("");
            const [fileName, setFileName] = useState("untitled.txt");
            const [saveStatus, setSaveStatus] = useState("idle");
            const autoSaveRef = useRef(null);

            useEffect(() => {
                if (unlocked) {
                    const saved = localStorage.getItem(STORAGE_KEY);
                    if (saved) {
                        try {
                            const p = JSON.parse(saved);
                            setContent(p.content || "");
                            setFileName(p.fileName || "untitled.txt");
                        } catch {}
                    }
                }
            }, [unlocked]);

            const handleUnlock = () => {
                if (codeInput === ACCESS_CODE) {
                    setUnlocked(true);
                    setCodeError(false);
                } else {
                    setCodeError(true);
                    setCodeInput("");
                }
            };

            const save = (text = content, name = fileName) => {
                setSaveStatus("saving");
                setTimeout(() => {
                    localStorage.setItem(STORAGE_KEY, JSON.stringify({ content: text, fileName: name }));
                    setSaveStatus("saved");
                    setTimeout(() => setSaveStatus("idle"), 1500);
                }, 400);
            };

            const handleChange = (e) => {
                setContent(e.target.value);
                clearTimeout(autoSaveRef.current);
                autoSaveRef.current = setTimeout(() => save(e.target.value, fileName), 2000);
            };

            const download = () => {
                const blob = new Blob([content], { type: "text/plain" });
                const a = document.createElement("a");
                a.href = URL.createObjectURL(blob);
                a.download = fileName;
                a.click();
            };

            const btnStyle = (bg) => ({
                background: bg, color: "#fff", border: "none", borderRadius: "6px",
                padding: "7px 16px", fontSize: "13px", cursor: "pointer", fontWeight: 600,
            });

            if (!unlocked) {
                return (
                    <div style={{
                        minHeight: "100vh", display: "flex", flexDirection: "column",
                        alignItems: "center", justifyContent: "center",
                        background: "#f5f5f5", fontFamily: "sans-serif",
                    }}>
                        <div style={{
                            background: "#fff", borderRadius: "10px", padding: "36px 32px",
                            boxShadow: "0 2px 12px rgba(0,0,0,0.1)", width: "100%", maxWidth: "320px",
                            textAlign: "center",
                        }}>
                            <div style={{ fontSize: "32px", marginBottom: "8px" }}>🔒</div>
                            <h2 style={{ margin: "0 0 6px", fontSize: "18px", color: "#222" }}>Access Required</h2>
                            <p style={{ margin: "0 0 20px", fontSize: "13px", color: "#888" }}>Enter your access code to continue</p>
                            <input
                                type="password"
                                value={codeInput}
                                onChange={e => { setCodeInput(e.target.value); setCodeError(false); }}
                                onKeyDown={e => e.key === "Enter" && handleUnlock()}
                                placeholder="Access code"
                                style={{
                                    width: "100%", padding: "10px 12px", borderRadius: "6px", fontSize: "14px",
                                    border: codeError ? "1.5px solid #ef4444" : "1.5px solid #ddd",
                                    outline: "none", boxSizing: "border-box", marginBottom: "8px",
                                }}
                            />
                            {codeError && <p style={{ color: "#ef4444", fontSize: "12px", margin: "0 0 10px" }}>Incorrect code. Try again.</p>}
                            <button onClick={handleUnlock} style={{
                                width: "100%", padding: "10px", background: "#333", color: "#fff",
                                border: "none", borderRadius: "6px", fontSize: "14px", cursor: "pointer", fontWeight: 600,
                            }}>Unlock</button>
                        </div>
                    </div>
                );
            }

            return (
                <div style={{
                    minHeight: "100vh", background: "#f5f5f5", fontFamily: "sans-serif",
                    display: "flex", flexDirection: "column", padding: "24px 16px", boxSizing: "border-box",
                }}>
                    <div style={{
                        background: "#fff", borderRadius: "10px", boxShadow: "0 1px 8px rgba(0,0,0,0.08)",
                        padding: "20px", flex: 1, display: "flex", flexDirection: "column", gap: "12px",
                    }}>
                        <div style={{ display: "flex", gap: "8px", alignItems: "center", flexWrap: "wrap" }}>
                            <span style={{ fontSize: "16px", fontWeight: 700, color: "#333" }}>☁️ Cloud Editor</span>
                            <input
                                value={fileName}
                                onChange={e => setFileName(e.target.value)}
                                style={{
                                    marginLeft: "auto", border: "1px solid #ddd", borderRadius: "5px",
                                    padding: "5px 10px", fontSize: "13px", color: "#333", outline: "none", width: "150px",
                                }}
                            />
                        </div>

                        <textarea
                            value={content}
                            onChange={handleChange}
                            placeholder="Start typing..."
                            style={{
                                flex: 1, minHeight: "360px", border: "1px solid #e0e0e0", borderRadius: "7px",
                                padding: "14px", fontSize: "14px", lineHeight: "1.7", resize: "vertical",
                                outline: "none", fontFamily: "monospace", color: "#222", background: "#fafafa",
                            }}
                        />

                        <div style={{ display: "flex", gap: "8px", alignItems: "center", flexWrap: "wrap" }}>
                            <span style={{ fontSize: "12px", color: "#aaa" }}>
                                {content.trim() === "" ? 0 : content.trim().split(/\s+/).length} words
                            </span>
                            <span style={{
                                fontSize: "12px", fontWeight: 600, marginLeft: "8px",
                                color: saveStatus === "saved" ? "#22c55e" : saveStatus === "saving" ? "#f0a500" : "#aaa",
                            }}>
                                {saveStatus === "saved" ? "✓ Saved" : saveStatus === "saving" ? "Saving..." : "Auto-save on"}
                            </span>
                            <div style={{ marginLeft: "auto", display: "flex", gap: "8px" }}>
                                <button onClick={() => save()} style={btnStyle("#333")}>Save</button>
                                <button onClick={download} style={btnStyle("#555")}>Download</button>
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<CloudTextEditor />);
    </script>
</body>
</html>
