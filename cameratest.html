<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fingertip Theremin</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;background:#000;font-family:sans-serif;overflow:hidden}
#wrap{position:relative;width:100%;height:100vh;min-height:500px}
#video{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;transform:scaleX(-1)}
#cv{position:absolute;inset:0;width:100%;height:100%;transform:scaleX(-1);pointer-events:none}
#hud{position:absolute;inset:0;display:flex;flex-direction:column;justify-content:space-between;padding:16px;pointer-events:none}
.pill{background:rgba(0,0,0,0.6);border-radius:20px;padding:7px 14px;font-size:12px;color:rgba(255,255,255,0.85);pointer-events:all;cursor:default;white-space:nowrap}
.pill b{font-weight:500;color:#fff}
.btn{background:rgba(0,0,0,0.6);border:0.5px solid rgba(255,255,255,0.2);border-radius:20px;padding:7px 16px;font-size:12px;color:#fff;cursor:pointer;pointer-events:all}
.btn:hover{background:rgba(255,255,255,0.15)}
.btn:disabled{opacity:0.35;cursor:default}
#top{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
#bottom{display:flex;flex-direction:column;gap:8px}
#drop{background:rgba(0,0,0,0.6);border:0.5px dashed rgba(255,255,255,0.25);border-radius:12px;padding:14px 20px;text-align:center;cursor:pointer;pointer-events:all;font-size:12px;color:rgba(255,255,255,0.5)}
#drop:hover{background:rgba(0,0,0,0.75)}
#audio-panel{display:none}
#audio-row{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:6px}

select.pill{border:0.5px solid rgba(255,255,255,0.2)}
select.pill option{background:#111}
</style>
</head>
<body>
<div id="wrap">
  <video id="video" autoplay playsinline muted></video>
  <canvas id="cv"></canvas>

  <div id="hud">
    <div id="top">
      <span class="pill" id="p-vol">vol —</span>
      <span class="pill" id="p-freq">freq —</span>
      <select class="pill" id="frange">
        <option value="80,800">bass</option>
        <option value="200,2000" selected>mid</option>
        <option value="500,5000">high</option>
      </select>
      <div style="margin-left:auto;display:flex;gap:8px">
        <button class="btn" id="btn-go" onclick="startCam()">Start</button>
        <button class="btn" id="btn-stop" onclick="stopCam()" disabled>Stop</button>
      </div>
      <span class="pill" id="p-status" style="color:rgba(255,255,255,0.4)">ready</span>
    </div>

    <div id="bottom">
      <div id="drop" onclick="document.getElementById('finput').click()" ondragover="event.preventDefault()" ondrop="onDrop(event)">
        drop audio here or tap to upload · mp3 wav ogg m4a
        <input type="file" id="finput" accept="audio/*" style="display:none" onchange="loadFile(this.files[0])">
      </div>

      <div id="audio-panel">
        <div style="position:relative;pointer-events:all">
          <canvas id="waveform" height="48" onclick="seekWave(event)" style="display:block;width:100%;border-radius:8px;cursor:pointer"></canvas>
          <div id="pos-line" style="position:absolute;top:0;bottom:0;left:0;width:2px;background:rgba(255,255,255,0.75);border-radius:1px;pointer-events:none"></div>
          <span id="ptime" style="position:absolute;top:4px;right:8px;font-size:11px;color:rgba(255,255,255,0.5);pointer-events:none">0:00 / 0:00</span>
        </div>
        <input type="range" id="seek-slider" min="0" max="1000" value="0"
          style="width:100%;margin-top:6px;pointer-events:all;cursor:pointer"
          oninput="seekSlider(this.value)">
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4.1646424915/hands.js" crossorigin="anonymous"></script>
<script>
const video = document.getElementById('video');
const cv = document.getElementById('cv');
const ctx = cv.getContext('2d');
const TH = 4, IX = 8, NUM = 48;
const FREQ_LO = 20, FREQ_HI = 20000;
const TEAL = '#1D9E75', BLUE = '#378ADD';
const SPREAD_RATIO = 1.15;

let hands = null, stream = null, raf = null, running = false;
let lPos = null, rPos = null, volT = 1, filtT = 1;
let cvW = 0, cvH = 0;

// Smoothed targets — we lerp toward these each frame instead of
// scheduling Web Audio automation every 33ms (which causes zipper noise)
let gainTarget = 1, filtTarget = 20000;
let lastGainSet = 1, lastFiltSet = 20000;

function setStatus(msg, col) {
  const el = document.getElementById('p-status');
  el.textContent = msg;
  el.style.color = col || 'rgba(255,255,255,0.4)';
}

function resize() {
  const w = window.innerWidth, h = window.innerHeight;
  if (w === cvW && h === cvH) return;
  cvW = w; cvH = h;
  cv.width = w; cv.height = h;
}
window.addEventListener('resize', resize);
resize();

function handScale(lm) {
  const dx = (lm[9].x - lm[0].x) * cvW;
  const dy = (lm[9].y - lm[0].y) * cvH;
  return Math.hypot(dx, dy);
}

function pinch(lm, color, tag) {
  const tx = lm[TH].x * cvW, ty = lm[TH].y * cvH;
  const ix = lm[IX].x * cvW, iy = lm[IX].y * cvH;
  const d = Math.hypot(tx - ix, ty - iy);
  ctx.beginPath(); ctx.moveTo(tx, ty); ctx.lineTo(ix, iy);
  ctx.strokeStyle = color + '99'; ctx.lineWidth = 1.5; ctx.stroke();
  [[tx, ty], [ix, iy]].forEach(([px, py]) => {
    ctx.beginPath(); ctx.arc(px, py, 9, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(255,255,255,0.88)'; ctx.fill();
    ctx.strokeStyle = color; ctx.lineWidth = 1.5; ctx.stroke();
  });
  const scale = handScale(lm);
  const norm = scale > 0 ? Math.min(1, Math.max(0, d / (scale * SPREAD_RATIO))) : 0;
  ctx.fillStyle = '#fff'; ctx.font = '500 11px sans-serif';
  ctx.textAlign = 'center'; ctx.textBaseline = 'bottom';
  ctx.fillText(tag + ' ' + Math.round(norm * 100) + '%', (tx + ix) / 2, (ty + iy) / 2 - 5);
  return norm;
}

function skeleton(lm) {
  [[0,1],[1,2],[2,3],[3,4],[0,5],[5,6],[6,7],[7,8],[5,9],[9,10],[10,11],[11,12],
   [9,13],[13,14],[14,15],[15,16],[13,17],[17,18],[18,19],[19,20],[0,17]].forEach(([a,b]) => {
    ctx.beginPath();
    ctx.moveTo(lm[a].x * cvW, lm[a].y * cvH);
    ctx.lineTo(lm[b].x * cvW, lm[b].y * cvH);
    ctx.strokeStyle = 'rgba(255,255,255,0.12)'; ctx.lineWidth = 1; ctx.stroke();
  });
}

// Apply smoothed audio param changes — only fires when value meaningfully changed
// Only calls setTargetAtTime when the value has shifted enough to matter,
// preventing the zipper noise from per-frame scheduling
function applyAudioParams() {
  if (!actx || !gainN || !filt) return;
  if (Math.abs(gainTarget - lastGainSet) > 0.005) {
    gainN.gain.setTargetAtTime(gainTarget, actx.currentTime, 0.15);
    lastGainSet = gainTarget;
  }
  if (Math.abs(filtTarget - lastFiltSet) > 10) {
    filt.frequency.setTargetAtTime(filtTarget, actx.currentTime, 0.08);
    lastFiltSet = filtTarget;
  }
}

function drawBars(x1, y1, x2, y2) {
  if (!analyser) return;
  const buf = new Uint8Array(analyser.frequencyBinCount);
  analyser.getByteFrequencyData(buf);
  const dx = x2 - x1, dy = y2 - y1, dist = Math.hypot(dx, dy);
  if (dist < 10) return;
  const ux = dx / dist, uy = dy / dist;
  const gap = Math.max(1, dist * 0.012);
  const bw = (dist - gap * (NUM - 1)) / NUM;
  if (bw < 1) return;
  const maxA = Math.min(dist * 0.5, 180);
  const nyquist = actx ? actx.sampleRate / 2 : 22050;
  for (let i = 0; i < NUM; i++) {
    const t = i / (NUM - 1);
    const hz = FREQ_LO * Math.pow(FREQ_HI / FREQ_LO, t);
    const binIndex = Math.round((hz / nyquist) * (buf.length - 1));
    const raw = buf[Math.min(binIndex, buf.length - 1)] / 255;
    const fade = t <= filtT ? 1 : Math.max(0, 1 - (t - filtT) * 8);
    const val = raw * volT * fade;
    const amp = Math.max(2, val * maxA);
    const alpha = 0.25 + val * 0.75;
    const cx = x1 + ux * (i * (bw + gap) + bw / 2);
    const cy = y1 + uy * (i * (bw + gap) + bw / 2);
    ctx.save(); ctx.translate(cx, cy); ctx.rotate(Math.atan2(dy, dx));
    const hw = bw / 2, r = Math.min(3, hw * 0.4);
    ctx.fillStyle = `rgba(255,255,255,${alpha.toFixed(2)})`;
    if (ctx.roundRect) {
      ctx.beginPath(); ctx.roundRect(-hw, -amp, bw, amp, [r,r,0,0]); ctx.fill();
      ctx.beginPath(); ctx.roundRect(-hw, 0, bw, amp, [0,0,r,r]); ctx.fill();
    } else {
      ctx.fillRect(-hw, -amp, bw, amp); ctx.fillRect(-hw, 0, bw, amp);
    }
    ctx.restore();
  }
  ctx.strokeStyle = 'rgba(255,255,255,0.07)'; ctx.lineWidth = 1; ctx.setLineDash([3,5]);
  ctx.beginPath(); ctx.moveTo(x1, y1); ctx.lineTo(x2, y2); ctx.stroke();
  ctx.setLineDash([]);
}

function onResults(res) {
  ctx.clearRect(0, 0, cvW, cvH);
  if (!res.multiHandLandmarks || !res.multiHandedness) return;
  let lLm = null, rLm = null;
  res.multiHandedness.forEach((h, i) => {
    skeleton(res.multiHandLandmarks[i]);
    if (h.label === 'Right') lLm = res.multiHandLandmarks[i];
    else rLm = res.multiHandLandmarks[i];
  });
  lPos = null; rPos = null;

  if (lLm) {
    volT = pinch(lLm, TEAL, 'vol');
    document.getElementById('p-vol').innerHTML = 'vol <b>' + Math.round(volT * 100) + '%</b>';
    gainTarget = volT;
    lPos = { x: ((lLm[TH].x + lLm[IX].x) / 2) * cvW, y: ((lLm[TH].y + lLm[IX].y) / 2) * cvH };
  } else {
    volT = 1; gainTarget = 1;
    document.getElementById('p-vol').innerHTML = 'vol —';
  }

  if (rLm) {
    filtT = pinch(rLm, BLUE, 'freq');
    const [flo, fhi] = document.getElementById('frange').value.split(',').map(Number);
    document.getElementById('p-freq').innerHTML = 'freq <b>' + Math.round(flo * Math.pow(fhi / flo, filtT)) + ' Hz</b>';
    filtTarget = FREQ_LO * Math.pow(FREQ_HI / FREQ_LO, filtT);
    rPos = { x: ((rLm[TH].x + rLm[IX].x) / 2) * cvW, y: ((rLm[TH].y + rLm[IX].y) / 2) * cvH };
  } else {
    filtT = 1; filtTarget = 20000;
    document.getElementById('p-freq').innerHTML = 'freq —';
  }

  // Draw bars between hands if both visible, otherwise from left-hand pinch midpoint
  if (analyser && playing) {
    if (lPos && rPos) {
      drawBars(lPos.x, lPos.y, rPos.x, rPos.y);
    } else if (lPos) {
      // Single hand: draw bars horizontally from pinch centre across screen
      const barLen = cvW * 0.6;
      drawBars(lPos.x - barLen / 2, lPos.y, lPos.x + barLen / 2, lPos.y);
    }
  }
}

async function startCam() {
  document.getElementById('btn-go').disabled = true;
  setStatus('opening camera…', '#EF9F27');
  try {
    stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user', width: { ideal: 1280 }, height: { ideal: 720 } } });
    video.srcObject = stream;
    await new Promise(r => { video.readyState >= 2 ? r() : (video.onloadedmetadata = r); });
    await video.play();
    setStatus('loading model…', '#EF9F27');
    hands = new Hands({ locateFile: f => `https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4.1646424915/${f}` });
    hands.setOptions({ maxNumHands: 2, modelComplexity: 1, minDetectionConfidence: 0.6, minTrackingConfidence: 0.5 });
    hands.onResults(onResults);
    await hands.initialize();
    setStatus('live', '#1D9E75');
    running = true;
    document.getElementById('btn-stop').disabled = false;
    (async function loop() {
      if (!running) return;
      try { if (video.readyState >= 2) await hands.send({ image: video }); } catch (e) {}
      raf = requestAnimationFrame(loop);
    })();
  } catch (e) {
    setStatus('error: ' + e.message, '#E24B4A');
    document.getElementById('btn-go').disabled = false;
  }
}

function stopCam() {
  running = false;
  if (raf) cancelAnimationFrame(raf);
  if (stream) stream.getTracks().forEach(t => t.stop());
  if (hands) { hands.close(); hands = null; }
  ctx.clearRect(0, 0, cvW, cvH);
  document.getElementById('p-vol').innerHTML = 'vol —';
  document.getElementById('p-freq').innerHTML = 'freq —';
  setStatus('stopped');
  document.getElementById('btn-go').disabled = false;
  document.getElementById('btn-stop').disabled = true;
}

let actx = null, analyser = null, gainN = null, filt = null, abuf = null;
let src = null, startT = 0, offset = 0, playing = false, rafT = null;
const wc = document.getElementById('waveform');
const wctx = wc.getContext('2d');

function onDrop(e) {
  e.preventDefault();
  const f = e.dataTransfer.files[0];
  if (f && f.type.startsWith('audio/')) loadFile(f);
}

async function loadFile(file) {
  if (!file) return;
  if (playing) pauseA();
  if (actx) try { actx.close(); } catch (e) {}
  actx = new (window.AudioContext || window.webkitAudioContext)({ latencyHint: 'playback', sampleRate: 44100 });
  analyser = actx.createAnalyser();
  analyser.fftSize = 4096;
  analyser.smoothingTimeConstant = 0.85;
  gainN = actx.createGain();
  gainN.gain.setValueAtTime(1, actx.currentTime);
  filt = actx.createBiquadFilter();
  filt.type = 'lowpass';
  filt.frequency.setValueAtTime(20000, actx.currentTime);
  filt.Q.setValueAtTime(0.8, actx.currentTime);
  gainN.connect(filt);
  filt.connect(analyser);
  analyser.connect(actx.destination);
  lastGainSet = 1; lastFiltSet = 20000;
  abuf = await actx.decodeAudioData(await file.arrayBuffer());
  document.getElementById('drop').style.display = 'none';
  document.getElementById('audio-panel').style.display = 'block';
  drawWave();
  offset = 0;
  playA();
}

function drawWave() {
  const W = wc.offsetWidth || 600;
  wc.width = W; wc.height = 48;
  const data = abuf.getChannelData(0);
  const step = Math.ceil(data.length / W);
  wctx.clearRect(0, 0, W, 48);
  wctx.strokeStyle = 'rgba(55,138,221,0.55)';
  wctx.lineWidth = 1;
  for (let i = 0; i < W; i++) {
    let mn = 1, mx = -1;
    for (let j = 0; j < step; j++) { const v = data[i * step + j] || 0; if (v < mn) mn = v; if (v > mx) mx = v; }
    wctx.beginPath();
    wctx.moveTo(i, (1 + mn) / 2 * 48);
    wctx.lineTo(i, (1 + mx) / 2 * 48);
    wctx.stroke();
  }
}

function playA() {
  if (!abuf || !actx) return;
  if (actx.state === 'suspended') actx.resume();
  if (src) { try { src.stop(); } catch (e) {} src.disconnect(); src = null; }
  src = actx.createBufferSource();
  src.buffer = abuf;
  src.connect(gainN);
  src.start(0, offset);
  startT = actx.currentTime - offset;
  playing = true;
  src.onended = () => { if (playing) { playing = false; offset = 0; updateTime(); } };
  tickLoop();
}

function pauseA() {
  if (!playing) return;
  offset = actx.currentTime - startT;
  if (src) { try { src.stop(); } catch (e) {} src.disconnect(); src = null; }
  playing = false;
  cancelAnimationFrame(rafT); rafT = null;
  updateTime();
}

function togglePlay() {
  if (!abuf) return;
  if (playing) pauseA(); else playA();
}

// rAF loop just for updating the position UI while playing
function tickLoop() {
  applyAudioParams();
  updateTime();
  if (playing) rafT = requestAnimationFrame(tickLoop);
}

function seekWave(e) {
  if (!abuf) return;
  const r = wc.getBoundingClientRect();
  offset = Math.max(0, Math.min(1, (e.clientX - r.left) / r.width)) * abuf.duration;
  if (playing) { pauseA(); playA(); } else updateTime();
}

function updateTime() {
  const cur = playing && actx ? actx.currentTime - startT : offset;
  const dur = abuf ? abuf.duration : 0;
  const pct = dur > 0 ? Math.min(cur, dur) / dur : 0;
  const fmt = s => Math.floor(s / 60) + ':' + String(Math.floor(s % 60)).padStart(2, '0');
  document.getElementById('ptime').textContent = fmt(Math.min(cur, dur)) + ' / ' + fmt(dur);
  const sl = document.getElementById('seek-slider');
  if (sl && document.activeElement !== sl) sl.value = Math.round(pct * 1000);
  const waveW = wc.offsetWidth || 600;
  document.getElementById('pos-line').style.left = Math.round(pct * waveW) + 'px';
}

function seekSlider(val) {
  if (!abuf) return;
  offset = (val / 1000) * abuf.duration;
  if (playing) { pauseA(); playA(); } else updateTime();
}

</script>
</body>
</html>
