<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fingertip Theremin</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;background:#000;font-family:sans-serif;overflow:hidden}
#wrap{position:relative;width:100%;height:100vh;min-height:500px}
video{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;transform:scaleX(-1)}
canvas{position:absolute;inset:0;width:100%;height:100%;transform:scaleX(-1)}
#hud{position:absolute;inset:0;display:flex;flex-direction:column;justify-content:space-between;padding:16px;pointer-events:none}
.pill{background:rgba(0,0,0,0.6);border-radius:20px;padding:7px 14px;font-size:12px;color:rgba(255,255,255,0.85);pointer-events:all;cursor:default;white-space:nowrap}
.pill b{font-weight:500;color:#fff}
.btn{background:rgba(0,0,0,0.6);border:0.5px solid rgba(255,255,255,0.2);border-radius:20px;padding:7px 16px;font-size:12px;color:#fff;cursor:pointer;pointer-events:all}
.btn:hover{background:rgba(255,255,255,0.15)}
.btn:disabled{opacity:0.35;cursor:default}
#top{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
#bottom{display:flex;flex-direction:column;gap:8px}
#audio-row{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
#drop{background:rgba(0,0,0,0.6);border:0.5px dashed rgba(255,255,255,0.25);border-radius:12px;padding:14px 20px;text-align:center;cursor:pointer;pointer-events:all;font-size:12px;color:rgba(255,255,255,0.5)}
#drop:hover{background:rgba(0,0,0,0.75)}
#viz-box{background:rgba(0,0,0,0.5);border-radius:10px;overflow:hidden;position:relative;pointer-events:all}
#waveform{display:block;width:100%;cursor:pointer;border-radius:6px;margin-top:6px}
#ph-track{position:absolute;bottom:5px;left:10px;right:10px;height:2px;background:rgba(255,255,255,0.12);border-radius:1px;cursor:pointer}
#ph{height:100%;width:0%;background:rgba(255,255,255,0.55);border-radius:1px;transition:width 0.1s}
#time{position:absolute;bottom:10px;right:10px;font-size:10px;color:rgba(255,255,255,0.4)}
select.pill{border:0.5px solid rgba(255,255,255,0.2)}
select.pill option{background:#111}
</style>
</head>
<body>

<div id="wrap">
  <video id="video" autoplay playsinline muted></video>
  <canvas id="cv"></canvas>

  <div id="hud">
    <div id="top">
      <span class="pill" id="p-vol">vol —</span>
      <span class="pill" id="p-freq">freq —</span>
      <select class="pill" id="frange">
        <option value="80,800">bass</option>
        <option value="200,2000" selected>mid</option>
        <option value="500,5000">high</option>
      </select>
      <div style="margin-left:auto;display:flex;gap:8px">
        <button class="btn" id="btn-go" onclick="startCam()">Start</button>
        <button class="btn" id="btn-stop" onclick="stopCam()" disabled>Stop</button>
      </div>
      <span class="pill" id="p-status" style="color:rgba(255,255,255,0.4)">ready</span>
    </div>

    <div id="bottom">
      <div id="drop" onclick="document.getElementById('finput').click()" ondragover="event.preventDefault()" ondrop="onDrop(event)">
        drop audio here or tap to upload · mp3 wav ogg m4a
        <input type="file" id="finput" accept="audio/*" style="display:none" onchange="loadFile(this.files[0])">
      </div>

      <div id="audio-panel" style="display:none">
        <div id="audio-row">
          <button class="btn" id="btn-play" onclick="playA()">play</button>
          <button class="btn" id="btn-pause" onclick="pauseA()" disabled>pause</button>
          <button class="btn" onclick="stopA()">stop</button>
          <span class="pill" id="fname" style="max-width:180px;overflow:hidden;text-overflow:ellipsis"></span>
          <span class="pill" id="ptime" style="margin-left:auto">0:00 / 0:00</span>
        </div>
        <div id="viz-box">
          <canvas id="vizc" height="56" style="display:block;width:100%"></canvas>
          <div id="ph-track" onclick="seekBar(event)"><div id="ph"></div></div>
          <div id="time"></div>
        </div>
        <canvas id="waveform" height="32" onclick="seekWave(event)"></canvas>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4.1646424915/hands.js" crossorigin="anonymous"></script>
<script>
const video=document.getElementById('video');
const cv=document.getElementById('cv');
const ctx=cv.getContext('2d');
const TH=4,IX=8,NUM=18;
const TEAL='#1D9E75',BLUE='#378ADD';
let hands=null,stream=null,raf=null,running=false;
let lPos=null,rPos=null,volT=1,filtT=1;

function status(msg,col){
  const el=document.getElementById('p-status');
  el.textContent=msg;el.style.color=col||'rgba(255,255,255,0.4)';
}

function resize(){cv.width=cv.offsetWidth;cv.height=cv.offsetHeight;}
window.addEventListener('resize',resize);

function pinch(lm,color,tag){
  const w=cv.width,h=cv.height;
  const tx=lm[TH].x*w,ty=lm[TH].y*h,ix=lm[IX].x*w,iy=lm[IX].y*h;
  const d=Math.hypot(tx-ix,ty-iy);
  ctx.beginPath();ctx.moveTo(tx,ty);ctx.lineTo(ix,iy);
  ctx.strokeStyle=color+'99';ctx.lineWidth=1.5;ctx.stroke();
  [tx,ty,ix,iy].forEach((_,i,a)=>{if(i%2)return;
    ctx.beginPath();ctx.arc(a[i],a[i+1],9,0,Math.PI*2);
    ctx.fillStyle='rgba(255,255,255,0.88)';ctx.fill();
    ctx.strokeStyle=color;ctx.lineWidth=1.5;ctx.stroke();
  });
  const mx=(tx+ix)/2,my=(ty+iy)/2;
  ctx.fillStyle='#fff';ctx.font='500 11px sans-serif';
  ctx.textAlign='center';ctx.textBaseline='bottom';
  ctx.fillText(tag+' '+Math.round(d)+'px',mx,my-5);
  return d;
}

function skeleton(lm){
  const w=cv.width,h=cv.height;
  [[0,1],[1,2],[2,3],[3,4],[0,5],[5,6],[6,7],[7,8],[5,9],[9,10],[10,11],[11,12],
   [9,13],[13,14],[14,15],[15,16],[13,17],[17,18],[18,19],[19,20],[0,17]].forEach(([a,b])=>{
    ctx.beginPath();ctx.moveTo(lm[a].x*w,lm[a].y*h);ctx.lineTo(lm[b].x*w,lm[b].y*h);
    ctx.strokeStyle='rgba(255,255,255,0.12)';ctx.lineWidth=1;ctx.stroke();
  });
}

function bars(x1,y1,x2,y2){
  if(!analyser)return;
  const buf=new Uint8Array(analyser.frequencyBinCount);
  analyser.getByteFrequencyData(buf);
  const dx=x2-x1,dy=y2-y1,dist=Math.hypot(dx,dy);
  if(dist<10)return;
  const ux=dx/dist,uy=dy/dist;
  const gap=dist*0.025,bw=(dist-gap*(NUM-1))/NUM;
  if(bw<1)return;
  const maxA=Math.min(dist*0.5,180);
  for(let i=0;i<NUM;i++){
    const bin=Math.floor(i*(buf.length*0.6)/NUM);
    const raw=buf[bin]/255;
    const fade=i/NUM<=filtT?1:Math.max(0,1-(i/NUM-filtT)*6);
    const val=raw*volT*fade;
    const amp=Math.max(2,val*maxA);
    const alpha=0.25+val*0.75;
    const cx=x1+ux*(i*(bw+gap)+bw/2),cy=y1+uy*(i*(bw+gap)+bw/2);
    ctx.save();ctx.translate(cx,cy);ctx.rotate(Math.atan2(dy,dx));
    const hw=bw/2,r=Math.min(3,hw*0.4);
    ctx.fillStyle=`rgba(255,255,255,${alpha.toFixed(2)})`;
    if(ctx.roundRect){ctx.beginPath();ctx.roundRect(-hw,-amp,bw,amp,[r,r,0,0]);ctx.fill();
      ctx.beginPath();ctx.roundRect(-hw,0,bw,amp,[0,0,r,r]);ctx.fill();}
    else{ctx.fillRect(-hw,-amp,bw,amp);ctx.fillRect(-hw,0,bw,amp);}
    ctx.restore();
  }
  ctx.strokeStyle='rgba(255,255,255,0.07)';ctx.lineWidth=1;ctx.setLineDash([3,5]);
  ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);ctx.stroke();ctx.setLineDash([]);
}

function onResults(res){
  resize();ctx.clearRect(0,0,cv.width,cv.height);
  if(!res.multiHandLandmarks||!res.multiHandedness)return;
  let lLm=null,rLm=null;
  res.multiHandedness.forEach((h,i)=>{
    skeleton(res.multiHandLandmarks[i]);
    if(h.label==='Right')lLm=res.multiHandLandmarks[i];
    else rLm=res.multiHandLandmarks[i];
  });
  const w=cv.width,h=cv.height,mx=Math.hypot(w*0.25,h*0.25);
  lPos=null;rPos=null;
  if(lLm){
    const d=pinch(lLm,TEAL,'vol');
    volT=Math.min(1,Math.max(0,d/mx));
    document.getElementById('p-vol').innerHTML='vol <b>'+Math.round(volT*100)+'%</b>';
    if(gainN&&actx)gainN.gain.setTargetAtTime(volT,actx.currentTime,0.04);
    lPos={x:((lLm[TH].x+lLm[IX].x)/2)*w,y:((lLm[TH].y+lLm[IX].y)/2)*h};
  }else{volT=1;document.getElementById('p-vol').innerHTML='vol —';if(gainN&&actx)gainN.gain.setTargetAtTime(1,actx.currentTime,0.1);}
  if(rLm){
    const d=pinch(rLm,BLUE,'freq');
    filtT=Math.min(1,Math.max(0,d/mx));
    const [flo,fhi]=document.getElementById('frange').value.split(',').map(Number);
    const freq=Math.round(flo*Math.pow(fhi/flo,filtT));
    document.getElementById('p-freq').innerHTML='freq <b>'+freq+' Hz</b>';
    if(filt&&actx){const ff=200*Math.pow(18000/200,filtT);filt.frequency.setTargetAtTime(ff,actx.currentTime,0.05);}
    rPos={x:((rLm[TH].x+rLm[IX].x)/2)*w,y:((rLm[TH].y+rLm[IX].y)/2)*h};
  }else{filtT=1;document.getElementById('p-freq').innerHTML='freq —';if(filt&&actx)filt.frequency.setTargetAtTime(18000,actx.currentTime,0.1);}
  if(lPos&&rPos&&playing&&analyser)bars(lPos.x,lPos.y,rPos.x,rPos.y);
}

async function startCam(){
  document.getElementById('btn-go').disabled=true;
  status('opening camera…','#EF9F27');
  try{
    stream=await navigator.mediaDevices.getUserMedia({video:{facingMode:'user',width:{ideal:1280},height:{ideal:720}}});
    video.srcObject=stream;
    await new Promise(r=>{video.readyState>=2?r():video.onloadedmetadata=r;});
    await video.play();resize();
    status('loading model…','#EF9F27');
    hands=new Hands({locateFile:f=>`https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4.1646424915/${f}`});
    hands.setOptions({maxNumHands:2,modelComplexity:1,minDetectionConfidence:0.6,minTrackingConfidence:0.5});
    hands.onResults(onResults);await hands.initialize();
    status('live','#1D9E75');running=true;
    document.getElementById('btn-stop').disabled=false;
    (async function loop(){if(!running)return;try{if(video.readyState>=2)await hands.send({image:video});}catch(e){}raf=requestAnimationFrame(loop);})();
  }catch(e){status('error: '+e.message,'#E24B4A');document.getElementById('btn-go').disabled=false;}
}

function stopCam(){
  running=false;if(raf)cancelAnimationFrame(raf);
  if(stream)stream.getTracks().forEach(t=>t.stop());
  if(hands){hands.close();hands=null;}
  ctx.clearRect(0,0,cv.width,cv.height);
  document.getElementById('p-vol').innerHTML='vol —';
  document.getElementById('p-freq').innerHTML='freq —';
  status('stopped');document.getElementById('btn-go').disabled=false;document.getElementById('btn-stop').disabled=true;
}

let actx=null,analyser=null,gainN=null,filt=null,abuf=null;
let src=null,startT=0,offset=0,rafV=null,playing=false;
const vizc=document.getElementById('vizc');
const vc=vizc.getContext('2d');
const wc=document.getElementById('waveform');
const wctx=wc.getContext('2d');

function onDrop(e){e.preventDefault();const f=e.dataTransfer.files[0];if(f&&f.type.startsWith('audio/'))loadFile(f);}

async function loadFile(file){
  if(!file)return;
  if(actx)try{actx.close();}catch(e){}
  actx=new(window.AudioContext||window.webkitAudioContext)();
  analyser=actx.createAnalyser();analyser.fftSize=2048;analyser.smoothingTimeConstant=0.82;
  gainN=actx.createGain();gainN.gain.setValueAtTime(1,actx.currentTime);
  filt=actx.createBiquadFilter();filt.type='lowpass';filt.frequency.setValueAtTime(18000,actx.currentTime);filt.Q.setValueAtTime(0.7,actx.currentTime);
  gainN.connect(filt);filt.connect(analyser);analyser.connect(actx.destination);
  abuf=await actx.decodeAudioData(await file.arrayBuffer());
  document.getElementById('fname').textContent=file.name;
  document.getElementById('drop').style.display='none';
  document.getElementById('audio-panel').style.display='block';
  drawWave();offset=0;updateTime();
}

function drawWave(){
  const W=wc.offsetWidth||600;wc.width=W;wc.height=32;
  const data=abuf.getChannelData(0),step=Math.ceil(data.length/W);
  wctx.clearRect(0,0,W,32);
  wctx.strokeStyle='rgba(55,138,221,0.55)';wctx.lineWidth=1;
  for(let i=0;i<W;i++){
    let mn=1,mx=-1;
    for(let j=0;j<step;j++){const v=data[i*step+j]||0;if(v<mn)mn=v;if(v>mx)mx=v;}
    wctx.beginPath();wctx.moveTo(i,(1+mn)/2*32);wctx.lineTo(i,(1+mx)/2*32);wctx.stroke();
  }
}

function playA(){
  if(!abuf||!actx)return;
  if(actx.state==='suspended')actx.resume();
  if(src){try{src.stop();}catch(e){}src.disconnect();src=null;}
  src=actx.createBufferSource();src.buffer=abuf;src.connect(gainN);
  src.start(0,offset);startT=actx.currentTime-offset;playing=true;
  document.getElementById('btn-play').disabled=true;document.getElementById('btn-pause').disabled=false;
  src.onended=()=>{if(playing){playing=false;offset=0;document.getElementById('btn-play').disabled=false;document.getElementById('btn-pause').disabled=true;}};
  vizLoop();
}

function pauseA(){
  if(!playing)return;
  offset=actx.currentTime-startT;
  if(src){try{src.stop();}catch(e){}src.disconnect();src=null;}
  playing=false;document.getElementById('btn-play').disabled=false;document.getElementById('btn-pause').disabled=true;
}

function stopA(){
  if(src){try{src.stop();}catch(e){}src.disconnect();src=null;}
  playing=false;offset=0;
  document.getElementById('btn-play').disabled=false;document.getElementById('btn-pause').disabled=true;
  cancelAnimationFrame(rafV);
  const W=vizc.offsetWidth||600;vizc.width=W;vc.clearRect(0,0,W,56);
  document.getElementById('ph').style.width='0%';updateTime();
}

function seekBar(e){
  if(!abuf)return;
  const r=document.getElementById('ph-track').getBoundingClientRect();
  offset=Math.max(0,Math.min(1,(e.clientX-r.left)/r.width))*abuf.duration;
  if(playing){pauseA();playA();}else updateTime();
}

function seekWave(e){
  if(!abuf)return;
  const r=wc.getBoundingClientRect();
  offset=Math.max(0,Math.min(1,(e.clientX-r.left)/r.width))*abuf.duration;
  if(playing){pauseA();playA();}else updateTime();
}

function updateTime(){
  const cur=playing&&actx?actx.currentTime-startT:offset;
  const dur=abuf?abuf.duration:0;
  const fmt=s=>Math.floor(s/60)+':'+String(Math.floor(s%60)).padStart(2,'0');
  document.getElementById('ptime').textContent=fmt(Math.min(cur,dur))+' / '+fmt(dur);
  document.getElementById('ph').style.width=Math.round(dur>0?Math.min(cur,dur)/dur*100:0)+'%';
}

function vizLoop(){
  const W=vizc.offsetWidth||600;vizc.width=W;const H=56;
  const buf=new Uint8Array(analyser.frequencyBinCount);
  function frame(){
    rafV=requestAnimationFrame(frame);updateTime();
    vc.clearRect(0,0,W,H);
    analyser.getByteFrequencyData(buf);
    const n=64,gap=2,bw=(W-gap*(n-1))/n;
    for(let i=0;i<n;i++){
      const raw=buf[Math.floor(i*(buf.length*0.6)/n)]/255;
      const fade=i/n<=filtT?1:Math.max(0,1-(i/n-filtT)*6);
      const val=raw*volT*fade;
      const bh=Math.max(2,val*(H-4));
      vc.fillStyle=`rgba(255,255,255,${(0.3+val*0.7).toFixed(2)})`;
      if(vc.roundRect){vc.beginPath();vc.roundRect(i*(bw+gap),H-bh-2,bw,bh,2);vc.fill();}
      else vc.fillRect(i*(bw+gap),H-bh-2,bw,bh);
    }
    if(!playing)cancelAnimationFrame(rafV);
  }
  frame();
}
</script>
</body>
</html>
