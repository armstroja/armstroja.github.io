<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Portfolio.">
<title>armstroja</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #080808;
    color: #fff;
    font-family: 'Courier New', monospace;
    height: 100vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    transition: background 0.5s;
    touch-action: none;
  }
  canvas { display: block; }
  #c { position: relative; z-index: 1; cursor: grab; }

  #themes {
    position: fixed;
    top: 20px;
    display: flex;
    gap: 10px;
    z-index: 5;
  }
  .theme-dot {
    width: 11px; height: 11px;
    border-radius: 50%;
    cursor: pointer;
    border: 1.5px solid rgba(255,255,255,0.15);
    transition: transform 0.15s, border-color 0.15s;
  }
  .theme-dot:hover { transform: scale(1.25); }
  .theme-dot.active { border-color: rgba(255,255,255,0.6); transform: scale(1.2); }

  #modal {
    display: none;
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.4);
    align-items: center; justify-content: center;
    z-index: 10;
    padding: 16px;
  }
  #modal.open { display: flex; }
  #modal-box {
    background: rgba(255,255,255,0.015);
    backdrop-filter: blur(24px);
    -webkit-backdrop-filter: blur(24px);
    border: 1px solid rgba(255,255,255,0.04);
    padding: 32px 36px;
    max-width: 380px; width: 100%;
    position: relative;
    animation: fadeUp 0.18s ease;
  }
  @keyframes fadeUp {
    from { opacity:0; transform:translateY(10px); }
    to   { opacity:1; transform:translateY(0); }
  }
  #modal-close {
    position: absolute; top: 12px; right: 16px;
    background: none; border: none;
    color: #444; font-size: 1rem; cursor: pointer;
    font-family: inherit;
    /* bigger tap target on mobile */
    padding: 8px;
    margin: -8px;
  }
  #modal-close:hover { color: #fff; }
  #modal-type { font-size: 0.58rem; letter-spacing: 0.3em; text-transform: uppercase; margin-bottom: 8px; }
  #modal-title { font-size: 1.2rem; font-weight: 700; margin-bottom: 10px; }
  #modal-desc { font-size: 0.78rem; line-height: 1.75; color: #999; margin-bottom: 20px; }
  #modal-link {
    font-size: 0.65rem; letter-spacing: 0.2em; text-transform: uppercase;
    color: #fff; border: 1px solid rgba(255,255,255,0.3);
    padding: 7px 16px; text-decoration: none; display: inline-block;
    transition: background 0.15s;
  }
  #modal-link:hover { background: rgba(255,255,255,0.1); }
</style>
</head>
<body>

<div id="themes"></div>
<canvas id="c"></canvas>

<div id="modal">
  <div id="modal-box">
    <button id="modal-close">✕</button>
    <div id="modal-type"></div>
    <div id="modal-title"></div>
    <div id="modal-desc"></div>
    <a id="modal-link" href="#" target="_blank">View →</a>
  </div>
</div>

<script>
const themes = [
  { name: 'black',   bg: '#080808', dot: '#555555', accent: '#f0abfc' },
  { name: 'tan',     bg: '#c4a882', dot: '#f5e6d0', accent: '#1a0a00' },
  { name: 'seafoam', bg: '#2e6b58', dot: '#a8f0d4', accent: '#f9ffa0' },
  { name: 'blue',    bg: '#0d2a3f', dot: '#5ab4e8', accent: '#ffd166' },
];
let currentTheme = themes[0];

function applyTheme(t) {
  currentTheme = t;
  document.body.style.background = t.bg;
  document.querySelectorAll('.theme-dot').forEach(el =>
    el.classList.toggle('active', el.dataset.name === t.name));
}

const themeBar = document.getElementById('themes');
themes.forEach(t => {
  const d = document.createElement('div');
  d.className = 'theme-dot' + (t.name === 'black' ? ' active' : '');
  d.dataset.name = t.name;
  d.style.background = t.bg === '#080808' ? '#333' : t.bg;
  d.title = t.name;
  d.addEventListener('click', () => applyTheme(t));
  themeBar.appendChild(d);
});

// --- Canvas sizing (responsive) ---
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let SIZE, cx, cy, R;

function resizeCanvas() {
  SIZE = Math.min(window.innerWidth, window.innerHeight);
  canvas.width = canvas.height = SIZE;
  cx = SIZE / 2;
  cy = SIZE / 2;
  R  = SIZE * 0.42;
}
resizeCanvas();
window.addEventListener('resize', () => { resizeCanvas(); });

// --- Projects ---
let projects = [];

async function loadProjects() {
  try {
    const contentsResponse = await fetch('https://api.github.com/repos/armstroja/armstroja.github.io/contents');
    const contents = await contentsResponse.json();
    const htmlFiles = contents.filter(file =>
      file.name.endsWith('.html') &&
      file.name !== 'index.html' &&
      !file.path.startsWith('private/')
    );
    for (const file of htmlFiles) {
      try {
        const fileResponse = await fetch(file.download_url);
        const fileContent  = await fileResponse.text();
        const titleMatch = fileContent.match(/<title[^>]*>([^<]+)<\/title>/i);
        const title = titleMatch ? titleMatch[1] : file.name;
        const descMatch = fileContent.match(/<meta\s+name=["']description["']\s+content=["']([^"']+)["']/i);
        const description = descMatch ? descMatch[1] : `View the ${title} page`;
        projects.push({ type: 'page', title, desc: description,
          link: `https://armstroja.github.io/${file.name}` });
      } catch (e) { console.error(`Error fetching ${file.name}:`, e); }
    }
    assignProjectsToDots();
  } catch (e) { console.error('Error loading projects:', e); }
}

function assignProjectsToDots() {
  for (let i = 0; i < projects.length; i++) {
    const idx = Math.floor(dots.length * (i + 1) / (projects.length + 1));
    if (idx < dots.length) dots[idx].project = projects[i];
  }
}

// --- Dots ---
const ROWS = 20, COLS = 40;
let dots = [];
for (let i = 0; i <= ROWS; i++) {
  const phi = Math.PI * i / ROWS;
  for (let j = 0; j < COLS; j++) {
    const theta = 2 * Math.PI * j / COLS;
    dots.push({ phi, theta, proj: null, project: null });
  }
}
loadProjects();

// --- State ---
let rotY = 0, rotX = 0.85, velY = 0, velX = 0;
let dragging = false, lastX = 0, lastY = 0, hoveredDot = null;
let lastTime = performance.now();
let introAlpha = 1, introDismissed = false, introFading = false, orbPulseT = 0;
let spinningIn = false, spinProgress = 0;

// Track whether current pointer-down started as a drag
let pointerMoved = false;
const DRAG_THRESHOLD = 5; // px

function hexToRgb(hex) {
  return [parseInt(hex.slice(1,3),16), parseInt(hex.slice(3,5),16), parseInt(hex.slice(5,7),16)];
}

function project3D(phi, theta) {
  const x0 = Math.sin(phi)*Math.cos(theta);
  const y0 = Math.sin(phi)*Math.sin(theta);
  const z0 = Math.cos(phi);
  const x1 = x0*Math.cos(rotY) - y0*Math.sin(rotY);
  const y1 = x0*Math.sin(rotY) + y0*Math.cos(rotY);
  const y2 = y1*Math.cos(rotX) - z0*Math.sin(rotX);
  const z2 = y1*Math.sin(rotX) + z0*Math.cos(rotX);
  return { sx: cx + x1*R, sy: cy - y2*R, z: z2 };
}

function easeOutCubic(t) { return 1 - Math.pow(1-t, 3); }

function drawGlobe() {
  const [dr, dg, db] = hexToRgb(currentTheme.dot);
  const glow = ctx.createRadialGradient(cx, cy, R*0.7, cx, cy, R*1.25);
  glow.addColorStop(0, `rgba(${dr},${dg},${db},0.12)`);
  glow.addColorStop(1, `rgba(${dr},${dg},${db},0)`);
  ctx.beginPath(); ctx.arc(cx, cy, R*1.25, 0, Math.PI*2);
  ctx.fillStyle = glow; ctx.fill();

  for (const d of dots) d.proj = project3D(d.phi, d.theta);
  dots.sort((a,b) => a.proj.z - b.proj.z);

  for (const d of dots) {
    const {sx, sy, z} = d.proj;
    const vis = z > -0.05;
    if (d.project && vis) {
      const hov = d === hoveredDot;
      const col = currentTheme.accent;
      ctx.save();
      ctx.shadowColor = col; ctx.shadowBlur = hov ? 18 : 10;
      ctx.beginPath(); ctx.arc(sx, sy, hov ? 5 : 3.5, 0, Math.PI*2);
      ctx.fillStyle = col; ctx.fill();
      ctx.restore();
      if (hov) {
        ctx.beginPath(); ctx.arc(sx, sy, 9, 0, Math.PI*2);
        ctx.strokeStyle = col; ctx.globalAlpha = 0.5;
        ctx.lineWidth = 1; ctx.stroke(); ctx.globalAlpha = 1;
      }
    } else {
      const [dr2,dg2,db2] = hexToRgb(currentTheme.dot);
      const alpha = vis ? 0.35 + 0.45*((z+1)/2) : 0.06;
      const r = vis ? 1.2 + z*0.9 : 0.6;
      ctx.beginPath(); ctx.arc(sx, sy, r, 0, Math.PI*2);
      ctx.fillStyle = `rgba(${dr2},${dg2},${db2},${alpha})`; ctx.fill();
    }
  }
}

function drawIntro(alpha) {
  if (alpha <= 0) return;
  ctx.save();
  ctx.globalAlpha = alpha;
  const rad = R * 1.0;
  ctx.beginPath(); ctx.arc(cx, cy, rad, 0, Math.PI*2);
  ctx.fillStyle = 'rgba(8,8,8,0.82)'; ctx.fill();
  ctx.beginPath(); ctx.arc(cx, cy, rad, 0, Math.PI*2);
  ctx.strokeStyle = 'rgba(255,255,255,0.07)'; ctx.lineWidth = 1; ctx.stroke();

  const pulse = 0.7 + 0.3 * Math.sin(orbPulseT);
  const orbY  = cy - rad * 0.38;
  ctx.shadowColor = currentTheme.accent;
  ctx.shadowBlur  = 18 * pulse;
  ctx.beginPath(); ctx.arc(cx, orbY, 7 * pulse, 0, Math.PI*2);
  ctx.fillStyle = currentTheme.accent; ctx.fill();
  ctx.shadowBlur = 0;

  const isMobile = SIZE < 480;
  const baseFontSize = isMobile ? SIZE * 0.028 : SIZE * 0.02;
  const lh = SIZE * (isMobile ? 0.038 : 0.030);

  ctx.globalAlpha = alpha * 0.72;
  ctx.font = baseFontSize + 'px Courier New';
  ctx.textAlign = 'center';
  ctx.fillStyle = '#fff';

  const lines = isMobile
    ? ['Drag to spin.', '', 'Glowing orbs mark projects']
    : ['Drag the globe to spin it.', '', 'Glowing orbs mark projects'];

  let ty = cy - rad * 0.04;
  for (const line of lines) { ctx.fillText(line, cx, ty); ty += lh; }

  const blink = 0.25 + 0.45 * (0.5 + 0.5*Math.sin(orbPulseT * 1.4));
  ctx.globalAlpha = alpha * blink;
  ctx.font = (baseFontSize * 0.9) + 'px Courier New';
  const hint = isMobile ? 'tap to begin  →' : 'click to begin  →';
  ctx.fillText(hint, cx, cy + rad * 0.58);
  ctx.restore();
}

function loop(now) {
  const dt = Math.min((now - lastTime) / 16.67, 3);
  lastTime = now;
  orbPulseT += 0.04 * dt;

  if (introFading) {
    introAlpha = Math.max(0, introAlpha - 0.045 * dt);
    if (introAlpha <= 0) introFading = false;
  }
  if (spinningIn) {
    spinProgress = Math.min(spinProgress + dt / 72, 1);
    rotY += 0.002 * easeOutCubic(spinProgress) * dt;
    if (spinProgress >= 1) { spinningIn = false; velY = 0.002; }
  } else if (!dragging && introDismissed) {
    velY += (0.002 - velY) * 0.02 * dt;
    velX *= Math.pow(0.96, dt);
    rotY += velY * dt;
    rotX += velX * dt;
  }

  ctx.clearRect(0, 0, SIZE, SIZE);
  drawGlobe();
  drawIntro(introAlpha);
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);

// --- Shared helpers ---
function canvasPoint(clientX, clientY) {
  const r = canvas.getBoundingClientRect();
  return { x: clientX - r.left, y: clientY - r.top };
}

function findHoveredDot(mx, my) {
  for (const d of dots) {
    if (!d.project || !d.proj || d.proj.z < 0) continue;
    const dx = d.proj.sx - mx, dy = d.proj.sy - my;
    if (dx*dx + dy*dy < 144) return d; // 12px radius (generous for touch)
  }
  return null;
}

function dismiss() {
  introDismissed = true;
  introFading    = true;
  spinningIn     = true;
  spinProgress   = 0;
  velY = 0;
}

function openModal(p) {
  document.getElementById('modal-type').textContent  = p.type;
  document.getElementById('modal-type').style.color  = currentTheme.accent;
  document.getElementById('modal-title').textContent = p.title;
  document.getElementById('modal-desc').textContent  = p.desc;
  document.getElementById('modal-link').href         = p.link;
  document.getElementById('modal').classList.add('open');
}

// --- Mouse events ---
canvas.addEventListener('click', e => {
  if (!introDismissed) { dismiss(); return; }
  const {x, y} = canvasPoint(e.clientX, e.clientY);
  const d = findHoveredDot(x, y);
  if (d) openModal(d.project);
});

canvas.addEventListener('mousemove', e => {
  if (!introDismissed) return;
  const {x, y} = canvasPoint(e.clientX, e.clientY);
  if (dragging) {
    const dx = e.clientX - lastX, dy = e.clientY - lastY;
    velY = dx * 0.003; velX = dy * 0.003;
    rotY += velY; rotX += velX;
    lastX = e.clientX; lastY = e.clientY;
    return;
  }
  hoveredDot = findHoveredDot(x, y);
  canvas.style.cursor = hoveredDot ? 'pointer' : 'grab';
});

canvas.addEventListener('mousedown', e => {
  if (!introDismissed) return;
  dragging = true; lastX = e.clientX; lastY = e.clientY;
  canvas.style.cursor = 'grabbing';
});
window.addEventListener('mouseup', () => { dragging = false; });

// --- Touch events ---
canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  const t = e.touches[0];
  lastX = t.clientX; lastY = t.clientY;
  pointerMoved = false;
  dragging = true;
}, { passive: false });

canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  if (!dragging) return;
  const t = e.touches[0];
  const dx = t.clientX - lastX, dy = t.clientY - lastY;

  if (!pointerMoved && Math.sqrt(dx*dx + dy*dy) > DRAG_THRESHOLD) {
    if (!introDismissed) { dismiss(); }
    pointerMoved = true;
  }

  if (introDismissed) {
    velY = dx * 0.003; velX = dy * 0.003;
    rotY += velY; rotX += velX;
  }
  lastX = t.clientX; lastY = t.clientY;
}, { passive: false });

canvas.addEventListener('touchend', e => {
  e.preventDefault();
  dragging = false;

  // Treat as a tap if barely moved
  if (!pointerMoved) {
    if (!introDismissed) { dismiss(); return; }
    const t = e.changedTouches[0];
    const {x, y} = canvasPoint(t.clientX, t.clientY);
    const d = findHoveredDot(x, y);
    if (d) openModal(d.project);
  }
}, { passive: false });

// --- Modal close ---
document.getElementById('modal-close').onclick = () =>
  document.getElementById('modal').classList.remove('open');
document.getElementById('modal').addEventListener('click', e => {
  if (e.target.id === 'modal') document.getElementById('modal').classList.remove('open');
});
</script>
</body>
</html>
