<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project Titles</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>
    <div id="modal" style="display:none;">
        <h2 id="modal-title"></h2>
        <p id="modal-description"></p>
        <a id="modal-link" href="#">View Page</a>
    </div>
    <script>
        async function fetchProjectTitles() {
            const response = await fetch('https://api.github.com/repos/armstroja/armstroja.github.io/git/trees/main');
            const data = await response.json();
            const projects = [];

            for (const file of data.tree) {
                if (file.path.endsWith('.html')) {
                    const titleResponse = await fetch(file.url);
                    const titleData = await titleResponse.json();
                    const fileContent = atob(titleData.content);
                    const titleMatch = fileContent.match(/<title>(.*?)<\/title>/);
                    if (titleMatch) {
                        projects.push({
                            title: titleMatch[1],
                            url: `https://armstroja.github.io/${file.path}`,
                        });
                    }
                }
            }

            return projects;
        }

        function showModal(title, description, url) {
            document.getElementById('modal-title').innerText = title;
            document.getElementById('modal-description').innerText = 'Type: page';
            document.getElementById('modal-link').href = url;
            document.getElementById('modal').style.display = 'block';
        }

        // Call the function and display project titles
        fetchProjectTitles().then(projects => {
            projects.forEach(project => {
                const dot = document.createElement('div');
                dot.innerText = project.title;
                dot.onclick = () => showModal(project.title, 'A generic description of the project.', project.url);
                document.body.appendChild(dot);
            });
        });
    </script>
</body>
</html>
