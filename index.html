<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>STEM MIXER | ENTER</title>
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
        background: #f5f5f0; 
        color: #2a2a2a;
        font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 20px;
        overflow: hidden;
        position: relative;
        user-select: none;
        -webkit-user-select: none;
    }

    #art-bg {
        position: fixed;
        inset: 0;
        z-index: 0;
        background: radial-gradient(circle at center, #ffffff 0%, #e2e2d5 100%);
        filter: blur(40px);
        opacity: 0.6;
        transition: transform 0.1s ease-out;
    }

    .container {
        position: relative;
        z-index: 1;
        text-align: center;
        max-width: 400px;
        width: 100%;
    }

    /* Single Large Bar Styling */
    #eq-container {
        display: flex;
        justify-content: center;
        gap: 16px; /* Increased gap for larger bars */
        margin-bottom: 30px;
        height: 60px; /* Slightly taller for impact */
        align-items: flex-end;
    }

    .eq-bar-large {
        width: 24px; /* Wider, "huge" bar */
        border-radius: 4px; /* Smoother corners for larger size */
        transition: height 0.12s ease-out, background-color 0.2s ease;
        background: #dcdcd0;
    }

    h1 {
        font-size: 10px;
        letter-spacing: .5em;
        text-transform: uppercase;
        color: #4a4a44;
        margin-bottom: 40px;
    }

    .hero-box {
        background: rgba(255, 255, 255, 0.4);
        border: 1px solid #dcdcd0;
        border-radius: 12px;
        padding: 40px 20px;
        backdrop-filter: blur(10px);
        -webkit-backdrop-filter: blur(10px);
    }

    .enter-btn {
        display: inline-block;
        padding: 16px 32px;
        background: #2a2a2a;
        color: #f5f5f0;
        text-decoration: none;
        font-size: 9px;
        letter-spacing: .3em;
        text-transform: uppercase;
        border-radius: 30px;
        transition: all 0.2s ease;
        border: 1px solid transparent;
        cursor: pointer;
        margin-bottom: 20px;
    }

    .enter-btn:hover {
        background: #8040ff;
        transform: translateY(-2px);
        box-shadow: 0 4px 15px rgba(128, 64, 255, 0.2);
    }

    .features {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 15px;
        margin-top: 30px;
    }

    .feat-item {
        font-size: 8px;
        letter-spacing: .15em;
        text-transform: uppercase;
        color: #8a8a80;
        padding: 10px;
        border-top: 1px solid #dcdcd0;
    }

    .footer-links {
        margin-top: 40px;
        display: flex;
        justify-content: center;
        gap: 20px;
    }

    .footer-links a {
        font-size: 8px;
        letter-spacing: .2em;
        text-transform: lowercase;
        color: #a0a090;
        text-decoration: none;
    }
</style>
</head>
<body>

<div id="art-bg"></div>

<div class="container">
    <div id="eq-container">
        <div class="eq-bar-large" id="bar-0"></div>
        <div class="eq-bar-large" id="bar-1"></div>
        <div class="eq-bar-large" id="bar-2"></div>
        <div class="eq-bar-large" id="bar-3"></div>
    </div>

    <h1>Stem Mixer</h1>

    <div class="hero-box">
        <a href="mixer.html" class="enter-btn">Launch Workspace</a>
        
        <div class="features">
            <div class="feat-item">4-Channel Split</div>
            <div class="feat-item">Jog-Wheel Scrub</div>
            <div class="feat-item">Visual EQ</div>
            <div class="feat-item">Client-Side</div>
        </div>
    </div>

    <div class="footer-links">
        <a href="https://github.com/armstroja/armstroja.github.io" target="_blank">Git Repository</a>
        <a href="#">Privacy</a>
    </div>
</div>

<script>
    const STEM_COLORS = ['#ff0066', '#f5a623', '#00b8ff', '#20d67b'];

    // Initialize bars with colors
    STEM_COLORS.forEach((color, i) => {
        const bar = document.getElementById(`bar-${i}`);
        bar.style.backgroundColor = color + 'cc'; // Set base color
    });

    function animateBars() {
        STEM_COLORS.forEach((color, i) => {
            const bar = document.getElementById(`bar-${i}`);
            
            // Generate random height for the huge bar
            const randomHeight = Math.floor(Math.random() * 50) + 10;
            bar.style.height = `${randomHeight}px`;
            
            // Randomly shift opacity to simulate intensity
            if (Math.random() > 0.8) {
                bar.style.backgroundColor = color; // Solid on peak
            } else {
                bar.style.backgroundColor = color + 'cc'; // Semi-transparent
            }
        });
        setTimeout(animateBars, 150);
    }

    animateBars();

    // Parallax background
    window.addEventListener('mousemove', (e) => {
        const moveX = (e.clientX - window.innerWidth / 2) * 0.01;
        const moveY = (e.clientY - window.innerHeight / 2) * 0.01;
        document.getElementById('art-bg').style.transform = `translate(${moveX}px, ${moveY}px) scale(1.1)`;
    });
</script>

</body>
</html>
