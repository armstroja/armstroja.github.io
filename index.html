<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>STEM MIXER | ENTER</title>
<style>
    /* Inherited core styles from your mixer */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
        background: #f5f5f0; 
        color: #2a2a2a;
        font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 20px;
        overflow: hidden;
        position: relative;
    }

    #art-bg {
        position: fixed;
        inset: 0;
        z-index: 0;
        background: radial-gradient(circle at center, #ffffff 0%, #e2e2d5 100%);
        filter: blur(40px);
        opacity: 0.6;
    }

    .container {
        position: relative;
        z-index: 1;
        text-align: center;
        max-width: 400px;
        width: 100%;
    }

    h1 {
        font-size: 11px;
        letter-spacing: .5em;
        text-transform: uppercase;
        color: #4a4a44;
        margin-bottom: 40px;
        animation: fadeIn 1.5s ease-out;
    }

    .hero-box {
        background: rgba(255, 255, 255, 0.4);
        border: 1px solid #dcdcd0;
        border-radius: 12px;
        padding: 40px 20px;
        backdrop-filter: blur(10px);
        -webkit-backdrop-filter: blur(10px);
        transition: transform 0.3s ease;
    }

    .enter-btn {
        display: inline-block;
        padding: 16px 32px;
        background: #2a2a2a;
        color: #f5f5f0;
        text-decoration: none;
        font-size: 9px;
        letter-spacing: .3em;
        text-transform: uppercase;
        border-radius: 30px;
        transition: all 0.2s ease;
        border: 1px solid transparent;
        cursor: pointer;
        margin-bottom: 20px;
    }

    .enter-btn:hover {
        background: #8040ff;
        transform: translateY(-2px);
        box-shadow: 0 4px 15px rgba(128, 64, 255, 0.2);
    }

    .enter-btn:active {
        transform: scale(0.96);
    }

    .features {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 15px;
        margin-top: 30px;
    }

    .feat-item {
        font-size: 8px;
        letter-spacing: .15em;
        text-transform: uppercase;
        color: #8a8a80;
        padding: 10px;
        border-top: 1px solid #dcdcd0;
    }

    .footer-links {
        margin-top: 40px;
        display: flex;
        justify-content: center;
        gap: 20px;
    }

    .footer-links a {
        font-size: 8px;
        letter-spacing: .2em;
        text-transform: lowercase;
        color: #a0a090;
        text-decoration: none;
        transition: color 0.2s;
    }

    .footer-links a:hover {
        color: #1a1a1a;
    }

    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(10px); }
        to { opacity: 1; transform: translateY(0); }
    }

    /* Decorative dots mimicking the mixer segments */
    .deco-dots {
        display: flex;
        gap: 4px;
        justify-content: center;
        margin-bottom: 20px;
    }
    .dot {
        width: 12px; height: 6px;
        border-radius: 2px;
        background: #dcdcd0;
    }
    .dot.active { background: #8040ff; }
</style>
</head>
<body>

<div id="art-bg"></div>

<div class="container">
    <div class="deco-dots">
        <div class="dot"></div>
        <div class="dot active"></div>
        <div class="dot"></div>
        <div class="dot"></div>
    </div>

    <h1>Stem Mixer</h1>

    <div class="hero-box">
        <a href="mixer.html" class="enter-btn">Launch Workspace</a>
        
        <div class="features">
            <div class="feat-item">4-Channel Split</div>
            <div class="feat-item">Jog-Wheel Scrub</div>
            <div class="feat-item">Visual EQ</div>
            <div class="feat-item">Client-Side</div>
        </div>
    </div>

    <div class="footer-links">
        <a href="https://github.com/" target="armstroja/armstroja.github.io"> Git Repository</a>
        <a href="#">Privacy</a>
    </div>
</div>

<script>
    // Subtle parallax effect on the background
    window.addEventListener('mousemove', (e) => {
        const moveX = (e.clientX - window.innerWidth / 2) * 0.01;
        const moveY = (e.clientY - window.innerHeight / 2) * 0.01;
        document.getElementById('art-bg').style.transform = `translate(${moveX}px, ${moveY}px) scale(1.1)`;
    });
</script>

</body>
</html>
