<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>armstroja</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #080808;
    color: #fff;
    font-family: 'Courier New', monospace;
    height: 100vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    transition: background 0.5s;
  }
  canvas { cursor: grab; display: block; }

  #themes {
    position: fixed;
    top: 20px;
    display: flex;
    gap: 10px;
    z-index: 5;
  }
  .theme-dot {
    width: 11px;
    height: 11px;
    border-radius: 50%;
    cursor: pointer;
    border: 1.5px solid rgba(255,255,255,0.15);
    transition: transform 0.15s, border-color 0.15s;
  }
  .theme-dot:hover { transform: scale(1.25); }
  .theme-dot.active { border-color: rgba(255,255,255,0.6); transform: scale(1.2); }

  #modal {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.4);
    align-items: center;
    justify-content: center;
    z-index: 10;
  }
  #modal.open { display: flex; }
  #modal-box {
    background: rgba(255,255,255,0.015);
    backdrop-filter: blur(24px);
    -webkit-backdrop-filter: blur(24px);
    border: 1px solid rgba(255,255,255,0.04);
    padding: 32px 36px;
    max-width: 380px;
    width: 88%;
    position: relative;
    animation: fadeUp 0.18s ease;
  }
  @keyframes fadeUp {
    from { opacity:0; transform:translateY(10px); }
    to   { opacity:1; transform:translateY(0); }
  }
  #modal-close {
    position: absolute; top: 12px; right: 16px;
    background: none; border: none;
    color: #444; font-size: 1rem; cursor: pointer;
    font-family: inherit;
  }
  #modal-close:hover { color: #fff; }
  #modal-type {
    font-size: 0.58rem;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    margin-bottom: 8px;
  }
  #modal-title {
    font-size: 1.2rem;
    font-weight: 700;
    margin-bottom: 10px;
  }
  #modal-desc {
    font-size: 0.78rem;
    line-height: 1.75;
    color: #999;
    margin-bottom: 20px;
  }
  #modal-link {
    font-size: 0.65rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: #fff;
    border: 1px solid rgba(255,255,255,0.3);
    padding: 7px 16px;
    text-decoration: none;
    display: inline-block;
    transition: background 0.15s, color 0.15s;
  }
  #modal-link:hover { background: rgba(255,255,255,0.1); }
</style>
</head>
<body>

<div id="themes"></div>
<canvas id="c"></canvas>

<div id="modal">
  <div id="modal-box">
    <button id="modal-close">✕</button>
    <div id="modal-type"></div>
    <div id="modal-title"></div>
    <div id="modal-desc"></div>
    <a id="modal-link" href="#" target="_blank">View →</a>
  </div>
</div>

<script>
const themes = [
  { name: 'black',   bg: '#080808', dot: '#919191', accent: '#a78bfa' },
  { name: 'tan',     bg: '#c9b49a', dot: '#cfb99b', accent: '#7c5c3a' },
  { name: 'seafoam', bg: '#8ecfb8', dot: '#7ecfb1', accent: '#2d6b55' },
  { name: 'blue',    bg: '#7aaecf', dot: '#6db1de', accent: '#1a4a6e' },
];

let currentTheme = themes[0];

function applyTheme(t) {
  currentTheme = t;
  document.body.style.background = t.bg;
  document.querySelectorAll('.theme-dot').forEach(el => {
    el.classList.toggle('active', el.dataset.name === t.name);
  });
}

// Build theme switcher
const themeBar = document.getElementById('themes');
themes.forEach(t => {
  const d = document.createElement('div');
  d.className = 'theme-dot' + (t.name === 'black' ? ' active' : '');
  d.dataset.name = t.name;
  d.style.background = t.bg === '#080808' ? '#333' : t.bg;
  d.title = t.name;
  d.addEventListener('click', () => applyTheme(t));
  themeBar.appendChild(d);
});

const projects = [
  { type: "project", title: "Audio Mixer",        desc: "A web-based audio mixer for blending and controlling multiple audio sources in the browser.", link: "https://armstroja.github.io/audiomixer" },
  { type: "project", title: "Dart Score Tracker", desc: "A clean web app for tracking scores across a game of darts — no pencil and paper needed.", link: "https://armstroja.github.io/dartswebapp" },
];

const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const SIZE = Math.min(window.innerWidth, window.innerHeight) * 1.0;
canvas.width = canvas.height = SIZE;
const cx = SIZE/2, cy = SIZE/2, R = SIZE * 0.42;

const ROWS = 20, COLS = 40;
let dots = [];
for (let i = 0; i <= ROWS; i++) {
  const phi = Math.PI * i / ROWS;
  for (let j = 0; j < COLS; j++) {
    const theta = 2 * Math.PI * j / COLS;
    dots.push({ phi, theta, proj: null, project: null });
  }
}

for (let i = 0; i < projects.length; i++) {
  const idx = Math.floor(dots.length * (i + 1) / (projects.length + 1));
  dots[idx].project = projects[i];
}

let rotY = 0, rotX = 0.85, velY = 0.002, velX = 0;
let dragging = false, lastX = 0, lastY = 0, hoveredDot = null;
let lastTime = performance.now();

function project3D(phi, theta) {
  const x0 = Math.sin(phi)*Math.cos(theta);
  const y0 = Math.sin(phi)*Math.sin(theta);
  const z0 = Math.cos(phi);
  const x1 = x0*Math.cos(rotY) - y0*Math.sin(rotY);
  const y1 = x0*Math.sin(rotY) + y0*Math.cos(rotY);
  const y2 = y1*Math.cos(rotX) - z0*Math.sin(rotX);
  const z2 = y1*Math.sin(rotX) + z0*Math.cos(rotX);
  return { sx: cx + x1*R, sy: cy - y2*R, z: z2 };
}

function hexToRgb(hex) {
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  return `${r},${g},${b}`;
}

function draw() {
  ctx.clearRect(0, 0, SIZE, SIZE);

  // globe glow
  const glowRgb = hexToRgb(currentTheme.dot);
  const glow = ctx.createRadialGradient(cx, cy, R*0.7, cx, cy, R*1.25);
  glow.addColorStop(0, `rgba(${glowRgb},0.12)`);
  glow.addColorStop(1, `rgba(${glowRgb},0)`);
  ctx.beginPath();
  ctx.arc(cx, cy, R*1.25, 0, Math.PI*2);
  ctx.fillStyle = glow;
  ctx.fill();

  for (const d of dots) d.proj = project3D(d.phi, d.theta);
  dots.sort((a,b) => a.proj.z - b.proj.z);

  for (const d of dots) {
    const {sx, sy, z} = d.proj;
    const vis = z > -0.05;

    if (d.project && vis) {
      const hov = d === hoveredDot;
      const col = currentTheme.accent;
      const rgb = hexToRgb(col);
      ctx.save();
      ctx.shadowColor = col;
      ctx.shadowBlur = hov ? 18 : 10;
      ctx.beginPath();
      ctx.arc(sx, sy, hov ? 5 : 3.5, 0, Math.PI*2);
      ctx.fillStyle = col;
      ctx.fill();
      ctx.restore();
      if (hov) {
        ctx.beginPath();
        ctx.arc(sx, sy, 9, 0, Math.PI*2);
        ctx.strokeStyle = col;
        ctx.globalAlpha = 0.5;
        ctx.lineWidth = 1;
        ctx.stroke();
        ctx.globalAlpha = 1;
      }
    } else {
      const dotRgb = hexToRgb(currentTheme.dot);
      const alpha = vis ? 0.35 + 0.45*((z+1)/2) : 0.06;
      const r = vis ? 1.2 + z*0.9 : 0.6;
      ctx.beginPath();
      ctx.arc(sx, sy, r, 0, Math.PI*2);
      ctx.fillStyle = `rgba(${dotRgb},${alpha})`;
      ctx.fill();
    }
  }
}

function loop(now) {
  const dt = Math.min((now - lastTime) / 16.67, 3);
  lastTime = now;
  if (!dragging) {
    velY += (0.002 - velY) * 0.02 * dt;
    velX *= Math.pow(0.96, dt);
    rotY += velY * dt;
    rotX += velX * dt;
  }
  draw();
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);

canvas.addEventListener('mousemove', e => {
  const r = canvas.getBoundingClientRect();
  const mx = e.clientX - r.left, my = e.clientY - r.top;
  if (dragging) {
    const dx = e.clientX - lastX, dy = e.clientY - lastY;
    velY = dx * 0.003; velX = dy * 0.003;
    rotY += velY; rotX += velX;
    lastX = e.clientX; lastY = e.clientY;
    return;
  }
  hoveredDot = null;
  for (const d of dots) {
    if (!d.project || !d.proj || d.proj.z < 0) continue;
    const dx = d.proj.sx - mx, dy = d.proj.sy - my;
    if (dx*dx+dy*dy < 100) { hoveredDot = d; break; }
  }
  canvas.style.cursor = hoveredDot ? 'pointer' : 'grab';
});

canvas.addEventListener('mousedown', e => {
  dragging = true; lastX = e.clientX; lastY = e.clientY;
  canvas.style.cursor = 'grabbing';
});
window.addEventListener('mouseup', () => { dragging = false; });

canvas.addEventListener('click', () => {
  if (!hoveredDot) return;
  const p = hoveredDot.project;
  document.getElementById('modal-type').textContent  = p.type;
  document.getElementById('modal-type').style.color  = currentTheme.accent;
  document.getElementById('modal-title').textContent = p.title;
  document.getElementById('modal-desc').textContent  = p.desc;
  document.getElementById('modal-link').href         = p.link;
  document.getElementById('modal').classList.add('open');
});

document.getElementById('modal-close').onclick = () =>
  document.getElementById('modal').classList.remove('open');
document.getElementById('modal').addEventListener('click', e => {
  if (e.target.id === 'modal') document.getElementById('modal').classList.remove('open');
});
</script>
</body>
</html>
